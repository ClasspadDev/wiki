<svg
  xmlns="http://www.w3.org/2000/svg"
  width="520"
  height="260"
  viewBox="0 0 520 260"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Dino jumping physics with gravity</title>
  <desc id="desc">
    A pixel dino jumps upward with negative velocity, slows down because of gravity,
    then falls back to the ground.
  </desc>

  <rect x="0" y="0" width="520" height="260" fill="white" />

  <text
    x="20"
    y="28"
    fill="black"
    font-family="monospace"
    font-size="16"
    font-weight="700"
  >
    Jumping + Gravity
  </text>

  <text
    x="20"
    y="50"
    fill="black"
    font-family="monospace"
    font-size="11"
  >
    player_y += player_dy   |   player_dy += gravity
  </text>

  <line
    x1="20"
    y1="205"
    x2="500"
    y2="205"
    stroke="black"
    stroke-width="3"
    stroke-linecap="square"
  />

  <text
    x="430"
    y="222"
    fill="black"
    font-family="monospace"
    font-size="11"
  >
    ground: y = 0
  </text>

  <path
    d="M 60 185 C 140 95, 245 95, 330 185"
    fill="none"
    stroke="black"
    stroke-width="1"
    stroke-dasharray="4 5"
    opacity="0.45"
  />

  <text
    x="175"
    y="92"
    fill="black"
    font-family="monospace"
    font-size="11"
  >
    player_y &lt; 0 means in the air
  </text>

  <line
    x1="75"
    y1="175"
    x2="75"
    y2="125"
    stroke="black"
    stroke-width="2"
    marker-end="url(#arrow)"
  />
  <text
    x="88"
    y="145"
    fill="black"
    font-family="monospace"
    font-size="11"
  >
    player_dy = -8
  </text>
  <text
    x="88"
    y="160"
    fill="black"
    font-family="monospace"
    font-size="11"
  >
    jump moves up
  </text>

  <line
    x1="355"
    y1="118"
    x2="355"
    y2="170"
    stroke="black"
    stroke-width="2"
    marker-end="url(#arrow)"
  />
  <text
    x="370"
    y="145"
    fill="black"
    font-family="monospace"
    font-size="11"
  >
    gravity: +1
  </text>
  <text
    x="370"
    y="160"
    fill="black"
    font-family="monospace"
    font-size="11"
  >
    pulls down
  </text>

  <defs>
    <marker
      id="arrow"
      markerWidth="8"
      markerHeight="8"
      refX="4"
      refY="4"
      orient="auto"
      markerUnits="strokeWidth"
