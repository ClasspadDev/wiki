<svg
  xmlns="http://www.w3.org/2000/svg"
  width="900"
  height="320"
  viewBox="0 0 900 320"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">AABB collision: safe vs hit</title>
  <desc id="desc">
    Two panels showing axis-aligned bounding box collision between a player and a cactus.
    The left panel shows no overlap. The right panel shows overlap and a hit.
  </desc>

  <rect x="0" y="0" width="900" height="320" fill="white" />

  <defs>
    <g id="dino" fill="black" shape-rendering="crispEdges">
      <rect x="6" y="0" width="1" height="1" />
      <rect x="7" y="0" width="1" height="1" />
      <rect x="8" y="0" width="1" height="1" />
      <rect x="9" y="0" width="1" height="1" />

      <rect x="6" y="1" width="1" height="1" />
      <rect x="7" y="1" width="1" height="1" />
      <rect x="9" y="1" width="1" height="1" />
      <rect x="10" y="1" width="1" height="1" />

      <rect x="6" y="2" width="1" height="1" />
      <rect x="7" y="2" width="1" height="1" />
      <rect x="8" y="2" width="1" height="1" />
      <rect x="9" y="2" width="1" height="1" />
      <rect x="10" y="2" width="1" height="1" />

      <rect x="1" y="3" width="1" height="1" />
      <rect x="5" y="3" width="1" height="1" />
      <rect x="6" y="3" width="1" height="1" />
      <rect x="7" y="3" width="1" height="1" />
      <rect x="8" y="3" width="1" height="1" />
      <rect x="9" y="3" width="1" height="1" />

      <rect x="1" y="4" width="1" height="1" />
      <rect x="2" y="4" width="1" height="1" />
      <rect x="3" y="4" width="1" height="1" />
      <rect x="4" y="4" width="1" height="1" />
      <rect x="5" y="4" width="1" height="1" />
      <rect x="6" y="4" width="1" height="1" />
      <rect x="7" y="4" width="1" height="1" />
      <rect x="8" y="4" width="1" height="1" />
      <rect x="9" y="4" width="1" height="1" />
      <rect x="10" y="4" width="1" height="1" />

      <rect x="1" y="5" width="1" height="1" />
      <rect x="2" y="5" width="1" height="1" />
      <rect x="3" y="5" width="1" height="1" />
      <rect x="4" y="5" width="1" height="1" />
      <rect x="5" y="5" width="1" height="1" />
      <rect x="6" y="5" width="1" height="1" />
      <rect x="7" y="5" width="1" height="1" />
      <rect x="8" y="5" width="1" height="1" />
      <rect x="9" y="5" width="1" height="1" />
      <rect x="10" y="5" width="1" height="1" />

      <rect x="2" y="6" width="1" height="1" />
      <rect x="3" y="6" width="1" height="1" />
      <rect x="4" y="6" width="1" height="1" />
      <rect x="5" y="6" width="1" height="1" />
      <rect x="6" y="6" width="1" height="1" />
      <rect x="7" y="6" width="1" height="1" />
      <rect x="8" y="6" width="1" height="1" />
      <rect x="9" y="6" width="1" height="1" />

      <rect x="3" y="7" width="1" height="1" />
      <rect x="7" y="7" width="1" height="1" />

      <rect x="3" y="8" width="1" height="1" />
      <rect x="4" y="8" width="1" height="1" />
    </g>

    <g id="cactus" fill="black" shape-rendering="crispEdges">
      <rect x="2" y="0" width="1" height="1" />
      <rect x="2" y="1" width="1" height="1" />
      <rect x="4" y="1" width="1" height="1" />
      <rect x="0" y="2" width="1" height="1" />
      <rect x="2" y="2" width="1" height="1" />
      <rect x="4" y="2" width="1" height="1" />
      <rect x="0" y="3" width="1" height="1" />
      <rect x="2" y="3" width="1" height="1" />
      <rect x="4" y="3" width="1" height="1" />
      <rect x="0" y="4" width="1" height="1" />
      <rect x="1" y="4" width="1" height="1" />
      <rect x="2" y="4" width="1" height="1" />
      <rect x="3" y="4" width="1" height="1" />
      <rect x="4" y="4" width="1" height="1" />
      <rect x="2" y="5" width="1" height="1" />
      <rect x="2" y="6" width="1" height="1" />
    </g>
  </defs>

  <text x="24" y="28" fill="black" font-family="monospace" font-size="18" font-weight="700">
    AABB collision
  </text>
  <text x="24" y="48" fill="black" font-family="monospace" font-size="11">
    A = player, B = cactus
  </text>

  <rect x="24" y="58" width="16" height="16" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="46" y="70" fill="black" font-family="monospace" font-size="11">A box</text>

  <rect x="110" y="58" width="16" height="16" fill="none" stroke="#16a34a" stroke-width="2" />
  <text x="132" y="70" fill="black" font-family="monospace" font-size="11">B box</text>

  <rect x="196" y="58" width="16" height="16" fill="#ef4444" fill-opacity="0.20" stroke="#ef4444" stroke-width="1.5" />
  <text x="218" y="70" fill="black" font-family="monospace" font-size="11">overlap</text>

  <g transform="translate(30 90)">
    <rect x="0" y="0" width="390" height="190" rx="10" fill="white" stroke="black" stroke-width="1.5" />
    <text x="16" y="24" fill="#2563eb" font-family="monospace" font-size="16" font-weight="700">
      SAFE
    </text>
    <text x="16" y="42" fill="black" font-family="monospace" font-size="11">
      x ✗   y ✓
    </text>

    <line x1="20" y1="150" x2="370" y2="150" stroke="black" stroke-width="2" />

    <rect x="40" y="114" width="32" height="36" fill="none" stroke="#2563eb" stroke-width="2.5" />
    <text x="44" y="128" fill="#2563eb" font-family="monospace" font-size="11" font-weight="700">A</text>
    <use href="#dino" transform="translate(45 120) scale(2)" />

    <circle cx="40" cy="114" r="2.5" fill="#2563eb" />
    <circle cx="72" cy="150" r="2.5" fill="#2563eb" />
    <text x="10" y="104" fill="black" font-family="monospace" font-size="10">A(x1=40,y1=114)</text>
    <text x="28" y="168" fill="black" font-family="monospace" font-size="10">A(x2=72,y2=150)</text>

    <rect x="120" y="122" width="20" height="28" fill="none" stroke="#16a34a" stroke-width="2.5" />
    <text x="124" y="136" fill="#16a34a" font-family="monospace" font-size="11" font-weight="700">B</text>
    <use href="#cactus" transform="translate(123 126) scale(3)" />

    <circle cx="120" cy="122" r="2.5" fill="#16a34a" />
    <circle cx="140" cy="150" r="2.5" fill="#16a34a" />
    <text x="145" y="116" fill="black" font-family="monospace" font-size="10">B(x1=120,y1=122)</text>
    <text x="145" y="162" fill="black" font-family="monospace" font-size="10">B(x2=140,y2=150)</text>

    <text x="16" y="178" fill="black" font-family="monospace" font-size="11">
      72 &lt; 120  →  no horizontal overlap
    </text>
  </g>

  <g transform="translate(470 90)">
    <rect x="0" y="0" width="390" height="190" rx="10" fill="white" stroke="black" stroke-width="1.5" />
    <text x="16" y="24" fill="#dc2626" font-family="monospace" font-size="16" font-weight="700">
      HIT
    </text>
    <text x="16" y="42" fill="black" font-family="monospace" font-size="11">
      x ✓   y ✓
    </text>

    <line x1="20" y1="150" x2="370" y2="150" stroke="black" stroke-width="2" />

    <rect x="40" y="114" width="32" height="36" fill="none" stroke="#2563eb" stroke-width="2.5" />
    <text x="44" y="128" fill="#2563eb" font-family="monospace" font-size="11" font-weight="700">A</text>
    <use href="#dino" transform="translate(45 120) scale(2)" />

    <circle cx="40" cy="114" r="2.5" fill="#2563eb" />
    <circle cx="72" cy="150" r="2.5" fill="#2563eb" />
    <text x="10" y="104" fill="black" font-family="monospace" font-size="10">A(x1=40,y1=114)</text>
    <text x="28" y="168" fill="black" font-family="monospace" font-size="10">A(x2=72,y2=150)</text>

    <rect x="58" y="122" width="14" height="28" fill="#ef4444" fill-opacity="0.20" stroke="none" />

    <rect x="58" y="122" width="20" height="28" fill="none" stroke="#16a34a" stroke-width="2.5" />
    <text x="62" y="136" fill="#16a34a" font-family="monospace" font-size="11" font-weight="700">B</text>
    <use href="#cactus" transform="translate(61 126) scale(3)" />

    <circle cx="58" cy="122" r="2.5" fill="#16a34a" />
    <circle cx="78" cy="150" r="2.5" fill="#16a34a" />
    <text x="92" y="116" fill="black" font-family="monospace" font-size="10">B(x1=58,y1=122)</text>
    <text x="92" y="162" fill="black" font-family="monospace" font-size="10">B(x2=78,y2=150)</text>

    <text x="16" y="178" fill="black" font-family="monospace" font-size="11">
      72 &gt; 58  and  40 &lt; 78  →  overlap
    </text>
  </g>

  <rect x="24" y="290" width="836" height="20" fill="#f8f8f8" stroke="#d4d4d4" stroke-width="1" />
  <text x="34" y="304" fill="black" font-family="monospace" font-size="11">
    hit = ax &lt; bx+bw  and  ax+aw &gt; bx  and  ay &lt; by+bh  and  ay+ah &gt; by
  </text>
</svg>