<svg
  xmlns="http://www.w3.org/2000/svg"
  width="180"
  height="160"
  viewBox="0 0 180 160"
  role="img"
  aria-label="Animated square outline drawn line by line"
>
  <rect x="0" y="0" width="180" height="160" fill="white" />

  <rect x="49" y="39" width="82" height="82" fill="none" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="4 4" />

  <line
    x1="50"
    y1="40"
    x2="130"
    y2="40"
    stroke="black"
    stroke-width="4"
    stroke-linecap="square"
    stroke-dasharray="80"
    stroke-dashoffset="80"
  >
    <animate
      attributeName="stroke-dashoffset"
      values="80;0;0"
      keyTimes="0;0.18;1"
      dur="4s"
      repeatCount="indefinite"
    />
  </line>

  <line
    x1="130"
    y1="40"
    x2="130"
    y2="120"
    stroke="black"
    stroke-width="4"
    stroke-linecap="square"
    stroke-dasharray="80"
    stroke-dashoffset="80"
  >
    <animate
      attributeName="stroke-dashoffset"
      values="80;80;0;0"
      keyTimes="0;0.18;0.36;1"
      dur="4s"
      repeatCount="indefinite"
    />
  </line>

  <line
    x1="130"
    y1="120"
    x2="50"
    y2="120"
    stroke="black"
    stroke-width="4"
    stroke-linecap="square"
    stroke-dasharray="80"
    stroke-dashoffset="80"
  >
    <animate
      attributeName="stroke-dashoffset"
      values="80;80;0;0"
      keyTimes="0;0.36;0.54;1"
      dur="4s"
      repeatCount="indefinite"
    />
  </line>

  <line
    x1="50"
    y1="120"
    x2="50"
    y2="40"
    stroke="black"
    stroke-width="4"
    stroke-linecap="square"
    stroke-dasharray="80"
    stroke-dashoffset="80"
  >
    <animate
      attributeName="stroke-dashoffset"
      values="80;80;0;0"
      keyTimes="0;0.54;0.72;1"
      dur="4s"
      repeatCount="indefinite"
    />
  </line>

  <circle cx="50" cy="40" r="3" fill="black" opacity="0">
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.18;1" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="130" cy="40" r="3" fill="black" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.18;0.36;1" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="130" cy="120" r="3" fill="black" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.36;0.54;1" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="120" r="3" fill="black" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.54;0.72;1" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>