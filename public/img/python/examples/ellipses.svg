<svg
  xmlns="http://www.w3.org/2000/svg"
  width="360"
  height="140"
  viewBox="0 0 360 140"
  role="img"
  aria-label="Animated drawing of filled and outline circles and ellipses"
>
  <rect x="0" y="0" width="360" height="140" fill="white"/>

  <circle cx="40" cy="80" r="10" fill="black" fill-opacity="0"/>
  <circle cx="40" cy="80" r="10" fill="none" stroke="black" stroke-width="2"
          stroke-dasharray="63" stroke-dashoffset="63">
    <animate attributeName="stroke-dashoffset" values="63;0;0" keyTimes="0;0.15;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="80" r="10" fill="black" fill-opacity="0">
    <animate attributeName="fill-opacity" values="0;0;1;1" keyTimes="0;0.15;0.25;1" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="90" cy="80" r="10" fill="none" stroke="black" stroke-width="2"
          stroke-dasharray="63" stroke-dashoffset="63">
    <animate attributeName="stroke-dashoffset" values="63;63;0;0" keyTimes="0;0.28;0.43;1" dur="5s" repeatCount="indefinite"/>
  </circle>

  <rect x="150" y="70" width="20" height="20" fill="none" stroke="#d4d4d4" stroke-dasharray="3 3"/>

  <ellipse cx="160" cy="80" rx="10" ry="10" fill="rgb(230,230,255)" fill-opacity="0"/>
  <ellipse cx="160" cy="80" rx="10" ry="10" fill="none" stroke="black" stroke-width="2"
           stroke-dasharray="63" stroke-dashoffset="63">
    <animate attributeName="stroke-dashoffset" values="63;63;63;0;0" keyTimes="0;0.43;0.50;0.65;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="160" cy="80" rx="10" ry="10" fill="rgb(230,230,255)" fill-opacity="0">
    <animate attributeName="fill-opacity" values="0;0;0;0;1;1" keyTimes="0;0.43;0.50;0.65;0.75;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <rect x="210" y="70" width="20" height="20" fill="none" stroke="#d4d4d4" stroke-dasharray="3 3"/>

  <ellipse cx="220" cy="80" rx="10" ry="10" fill="none" stroke="rgb(0,0,255)" stroke-width="2"
           stroke-dasharray="63" stroke-dashoffset="63">
    <animate attributeName="stroke-dashoffset" values="63;63;63;63;0;0" keyTimes="0;0.60;0.68;0.76;0.91;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
</svg>